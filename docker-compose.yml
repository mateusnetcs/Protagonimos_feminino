services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jornada_produtor}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-please-change-this-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-${NEXTAUTH_URL}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USEAPI_TOKEN: ${USEAPI_TOKEN:-}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_APP_ID: ${MERCADOPAGO_APP_ID:-}
      MERCADOPAGO_APP_SECRET: ${MERCADOPAGO_APP_SECRET:-}
    depends_on:
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jornada_produtor}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
